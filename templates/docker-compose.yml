services:
  openclaw-gateway:
    image: alpine/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
      - "18791:18791"
    volumes:
      - "${INSTALL_DIR}/.openclaw:/root/.openclaw"
      - "${INSTALL_DIR}/workspace:/root/workspace"
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${GATEWAY_TOKEN}
    stdin_open: true
    tty: true
