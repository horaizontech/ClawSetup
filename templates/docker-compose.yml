services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:0.62
    stdin_open: true
    tty: true
    pull_policy: always
    container_name: openhands-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.62-nikolaik
      - LOG_ALL_EVENTS=true
      - SANDBOX_USER_ID=${SANDBOX_USER_ID:-1000}
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSTALL_DIR}/.openhands-state:/.openhands-state
      - ${WORKSPACE_BASE}:/opt/workspace_base
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${OPENCLAW_PORT:-3000}:3000"
