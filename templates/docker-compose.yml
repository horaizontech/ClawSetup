services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-alpine/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-alpine/openclaw:latest}
    container_name: openclaw-cli
    env_file: .env
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./workspace}:/home/node/.openclaw/workspace
    depends_on:
      - openclaw-gateway
    profiles: ["cli"]
